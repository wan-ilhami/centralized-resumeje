name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v3
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - run: cd centralized-resume && bun install
        env:
          BUN_INSTALL_CACHE_DIR: /tmp/bun-cache

      - run: cd centralized-resume && bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
